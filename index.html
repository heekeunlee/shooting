<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>SKY STRIKE 1942</title>
<style>
  :root { --w: 480px; --h: 720px; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    background: #0a0e17;
    color: #e8eef7;
    font-family: "Courier New", ui-monospace, monospace;
    -webkit-user-select: none; user-select: none;
    overflow: hidden;
  }
  #wrap {
    display: flex; align-items: center; justify-content: center;
    height: 100dvh; width: 100vw;
  }
  #stage {
    position: relative;
    width: min(100vw, calc(100dvh * 480 / 720));
    height: min(100dvh, calc(100vw * 720 / 480));
    background: #0b1c33;
    box-shadow: 0 0 40px rgba(0,0,0,.6), inset 0 0 0 2px #1b3556;
    touch-action: none;
  }
  canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }
  .hint { position: absolute; bottom: 6px; width: 100%; text-align: center;
    font-size: 11px; color: #6f88ad; letter-spacing: .5px; pointer-events: none; }
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="game" width="480" height="720"></canvas>
    <div class="hint">← → ↑ ↓ 이동 &nbsp;·&nbsp; Z / Space 발사 &nbsp;·&nbsp; X / Shift 롤(회피)</div>
  </div>
</div>
<script>
"use strict";
(() => {
  const W = 480, H = 720;
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  // ---- Input ----------------------------------------------------------------
  const keys = {};
  const KMAP = {
    ArrowLeft:"left", ArrowRight:"right", ArrowUp:"up", ArrowDown:"down",
    KeyA:"left", KeyD:"right", KeyW:"up", KeyS:"down",
    KeyZ:"fire", Space:"fire", KeyX:"roll", ShiftLeft:"roll", ShiftRight:"roll",
    Enter:"start", KeyP:"pause"
  };
  addEventListener("keydown", e => {
    const k = KMAP[e.code];
    if (k) { e.preventDefault(); if (!keys[k]) keys[k+"_p"] = true; keys[k] = true; }
  });
  addEventListener("keyup", e => { const k = KMAP[e.code]; if (k) { e.preventDefault(); keys[k] = false; } });
  // Touch: drag to move, tap-hold to fire, two-finger to roll
  let touchMove = null;
  canvas.addEventListener("touchstart", onTouch, {passive:false});
  canvas.addEventListener("touchmove", onTouch, {passive:false});
  canvas.addEventListener("touchend", e => { e.preventDefault(); touchMove=null; keys.fire=false;
    if (state==="title"||state==="over") keys.start_p=true; }, {passive:false});
  function onTouch(e){
    e.preventDefault();
    const r = canvas.getBoundingClientRect();
    if (e.touches.length>=2) { if(!keys.roll) keys.roll_p=true; keys.roll=true; } else keys.roll=false;
    const t = e.touches[0];
    const x = (t.clientX-r.left)/r.width*W, y=(t.clientY-r.top)/r.height*H;
    touchMove = {x,y}; keys.fire = true;
  }

  // ---- Audio (tiny WebAudio blips) -----------------------------------------
  let AC=null;
  function beep(freq, dur, type="square", vol=0.04){
    try{
      AC = AC || new (window.AudioContext||window.webkitAudioContext)();
      const o=AC.createOscillator(), g=AC.createGain();
      o.type=type; o.frequency.value=freq;
      g.gain.value=vol; o.connect(g); g.connect(AC.destination);
      o.start(); g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime+dur);
      o.stop(AC.currentTime+dur);
    }catch(_){}
  }

  // ---- Game state -----------------------------------------------------------
  let state = "title"; // title | play | over
  let player, bullets, ebullets, enemies, particles, powerups, boss;
  let score, hi = +(localStorage.getItem("ss1942_hi")||0);
  let spawnT, waveN, rollCd, frame, difficulty, bossPending;

  function reset(){
    player = { x:W/2, y:H-110, w:34, h:34, cool:0, lives:3, power:1,
               inv:0, rolling:0, rollDir:1, dead:false };
    bullets=[]; ebullets=[]; enemies=[]; particles=[]; powerups=[]; boss=null;
    score=0; spawnT=40; waveN=0; rollCd=0; frame=0; difficulty=1; bossPending=false;
  }

  // ---- Helpers --------------------------------------------------------------
  const rnd = (a,b)=>a+Math.random()*(b-a);
  function hit(a,b){ return Math.abs(a.x-b.x) < (a.w+b.w)/2*0.7 && Math.abs(a.y-b.y) < (a.h+b.h)/2*0.7; }
  function boom(x,y,color,n=14,spd=3){
    for(let i=0;i<n;i++) particles.push({x,y,vx:rnd(-spd,spd),vy:rnd(-spd,spd),
      life:rnd(18,34),max:34,color});
  }

  // ---- Spawning -------------------------------------------------------------
  function spawnWave(){
    waveN++;
    difficulty = 1 + waveN*0.06;
    if (waveN>0 && waveN%8===0){ bossPending = true; return; }
    const kind = Math.random();
    if (kind < 0.5){ // V formation
      const n = 5, cx = rnd(80,W-80);
      for(let i=0;i<n;i++){
        const off=(i-(n-1)/2);
        enemies.push(mkEnemy(cx+off*34, -30-Math.abs(off)*26, "grunt"));
      }
    } else if (kind < 0.8){ // side sweep
      const fromLeft = Math.random()<.5, n=4;
      for(let i=0;i<n;i++)
        enemies.push(mkEnemy(fromLeft?-30-i*40:W+30+i*40, rnd(60,180), "sweeper", fromLeft?1:-1));
    } else { // tough shooters
      for(let i=0;i<3;i++) enemies.push(mkEnemy(rnd(60,W-60), -30-i*70, "gunner"));
    }
  }

  function mkEnemy(x,y,type,dir=0){
    const base = { x,y,type,dir,t:rnd(0,6.28),shoot:rnd(40,120),w:30,h:26,markPow:false };
    if (type==="grunt")   Object.assign(base,{hp:1, vy:1.7*difficulty, score:100, w:28,h:24});
    if (type==="sweeper") Object.assign(base,{hp:2, vy:0, vx:2.4*dir*difficulty, score:150});
    if (type==="gunner")  Object.assign(base,{hp:3, vy:1.0*difficulty, score:250, w:34,h:30});
    return base;
  }

  // one enemy in each wave may carry a power-up (the classic red plane)
  function tagPowerCarrier(){
    if (enemies.length && Math.random()<0.6){
      const e = enemies[Math.floor(Math.random()*enemies.length)];
      e.markPow = true;
    }
  }

  // ---- Update ---------------------------------------------------------------
  function update(){
    frame++;
    // Player movement
    let sp = 4.2;
    let dx=0, dy=0;
    if (keys.left) dx-=1; if (keys.right) dx+=1;
    if (keys.up) dy-=1; if (keys.down) dy+=1;
    if (touchMove){
      const tx=touchMove.x, ty=touchMove.y-40;
      dx = Math.abs(tx-player.x)>3 ? Math.sign(tx-player.x) : 0;
      dy = Math.abs(ty-player.y)>3 ? Math.sign(ty-player.y) : 0;
      // proportional
      player.x += (tx-player.x)*0.25; player.y += (ty-player.y)*0.25;
    } else {
      player.x += dx*sp; player.y += dy*sp;
    }
    player.x = Math.max(18, Math.min(W-18, player.x));
    player.y = Math.max(30, Math.min(H-30, player.y));

    // Roll (invincible dodge)
    if (player.rolling>0){ player.rolling--; player.inv=Math.max(player.inv,1); }
    if ((keys.roll_p) && player.rolling===0 && rollCd<=0){
      player.rolling=24; player.rollDir = keys.left?-1:(keys.right?1:player.rollDir);
      rollCd=90; beep(660,0.12,"triangle",0.05);
    }
    if (rollCd>0) rollCd--;
    if (player.inv>0) player.inv--;

    // Firing
    if (player.cool>0) player.cool--;
    if (keys.fire && player.cool<=0 && !player.dead){
      const p=player.power;
      bullets.push({x:player.x, y:player.y-20, vx:0, vy:-9, w:6,h:12});
      if (p>=2){ bullets.push({x:player.x-10,y:player.y-14,vx:-1.2,vy:-8.6,w:5,h:10});
                 bullets.push({x:player.x+10,y:player.y-14,vx:1.2,vy:-8.6,w:5,h:10}); }
      if (p>=3){ bullets.push({x:player.x-16,y:player.y-6,vx:-3,vy:-7.5,w:5,h:10});
                 bullets.push({x:player.x+16,y:player.y-6,vx:3,vy:-7.5,w:5,h:10}); }
      player.cool = p>=3?5:7; beep(880,0.03,"square",0.02);
    }

    // Bullets
    bullets = bullets.filter(b=>{ b.x+=b.vx; b.y+=b.vy; return b.y>-20 && b.x>-20 && b.x<W+20; });
    ebullets = ebullets.filter(b=>{ b.x+=b.vx; b.y+=b.vy; return b.y<H+20 && b.y>-20 && b.x>-20 && b.x<W+20; });

    // Spawn waves
    if (!boss && !bossPending){
      spawnT--;
      if (spawnT<=0){ spawnWave(); tagPowerCarrier(); spawnT = Math.max(60, 150 - waveN*4); }
    }
    if (bossPending && enemies.length===0 && !boss){
      spawnBoss(); bossPending=false;
    }

    // Enemies
    for (const e of enemies){
      e.t += 0.05;
      if (e.type==="grunt"){ e.y+=e.vy; e.x += Math.sin(e.t)*1.4; }
      if (e.type==="sweeper"){ e.x+=e.vx; e.y += Math.sin(e.t*1.5)*1.2; }
      if (e.type==="gunner"){ e.y+=e.vy; if(e.y>rnd(120,220)) e.vy*=0.96; }
      // shooting
      if ((e.type==="gunner") && e.y>0){
        e.shoot--; if (e.shoot<=0){ shootAtPlayer(e, 3.0); e.shoot=rnd(70,130); }
      }
    }
    // enemy off-screen cull
    enemies = enemies.filter(e => e.y<H+50 && e.x>-80 && e.x<W+80);

    if (boss) updateBoss();

    // Collisions: player bullets vs enemies
    for (const b of bullets){
      for (const e of enemies){
        if (hit(b,e)){
          b.dead=true; e.hp--;
          boom(b.x,b.y,"#ffd24a",4,2);
          if (e.hp<=0){
            e.dead=true; score+=e.score; boom(e.x,e.y,"#ff8b3d",16,3.2); beep(180,0.15,"sawtooth",0.05);
            if (e.markPow) powerups.push({x:e.x,y:e.y,w:20,h:20,t:0,vy:1.4});
          }
          break;
        }
      }
      if (boss && !b.dead && hit(b,boss)){
        b.dead=true; boss.hp--; boom(b.x,b.y,"#ffd24a",4,2);
        boss.flash=4;
        if (boss.hp<=0) killBoss();
      }
    }
    bullets = bullets.filter(b=>!b.dead);
    enemies = enemies.filter(e=>!e.dead);

    // Power-ups
    for (const pu of powerups){ pu.y+=pu.vy; pu.t++; }
    powerups = powerups.filter(pu=>{
      if (hit(pu,player)){ player.power=Math.min(3,player.power+1); score+=200;
        boom(pu.x,pu.y,"#5ad1ff",12,2.5); beep(1200,0.15,"triangle",0.06); return false; }
      return pu.y<H+20;
    });

    // Damage to player
    if (!player.dead && player.inv<=0){
      let struck=false;
      for (const e of enemies){ if (hit(e,player)){ e.dead=true; boom(e.x,e.y,"#ff8b3d",14,3); struck=true; break; } }
      if (!struck) for (const b of ebullets){ if (hit(b,player)){ b.dead=true; struck=true; break; } }
      if (!struck && boss && hit(boss,player)) struck=true;
      if (struck) hurtPlayer();
      enemies = enemies.filter(e=>!e.dead);
      ebullets = ebullets.filter(b=>!b.dead);
    }

    // Particles
    for (const p of particles){ p.x+=p.vx; p.y+=p.vy; p.vx*=0.94; p.vy*=0.94; p.life--; }
    particles = particles.filter(p=>p.life>0);

    // clear one-frame press flags
    for (const k in keys) if (k.endsWith("_p")) keys[k]=false;
  }

  function shootAtPlayer(e, spd){
    const a=Math.atan2(player.y-e.y, player.x-e.x);
    ebullets.push({x:e.x,y:e.y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,w:8,h:8});
    beep(300,0.05,"square",0.02);
  }

  function hurtPlayer(){
    player.lives--; player.power=Math.max(1,player.power-1);
    boom(player.x,player.y,"#ff5252",26,4); beep(90,0.4,"sawtooth",0.08);
    player.inv=110;
    if (player.lives<0){ player.dead=true; endGame(); }
    else { player.x=W/2; player.y=H-110; }
  }

  // ---- Boss -----------------------------------------------------------------
  function spawnBoss(){
    boss={ x:W/2, y:-120, w:120, h:80, hp:60+waveN*10, hpMax:60+waveN*10,
           t:0, phase:"enter", vx:1.6, flash:0, gun:0 };
    beep(120,0.5,"sawtooth",0.08);
  }
  function updateBoss(){
    boss.t+=0.03; if (boss.flash>0) boss.flash--;
    if (boss.phase==="enter"){ boss.y+=1.5; if (boss.y>=110){ boss.y=110; boss.phase="fight"; } }
    else {
      boss.x += boss.vx; if (boss.x<80||boss.x>W-80) boss.vx*=-1;
      boss.y = 110 + Math.sin(boss.t)*20;
      boss.gun--;
      if (boss.gun<=0){
        // spread shot
        for(let i=-2;i<=2;i++){
          const a=Math.PI/2 + i*0.28;
          ebullets.push({x:boss.x,y:boss.y+30,vx:Math.cos(a)*3.2,vy:Math.sin(a)*3.2,w:9,h:9});
        }
        if (Math.random()<0.5) shootAtPlayer({x:boss.x,y:boss.y+30}, 4);
        boss.gun = Math.max(28, 60 - waveN*2);
      }
    }
  }
  function killBoss(){
    score += 3000; boom(boss.x,boss.y,"#ffb03d",60,5);
    for(let i=0;i<6;i++) setTimeout(()=>boom(boss.x+rnd(-40,40),boss.y+rnd(-30,30),"#ff5252",20,4), i*80);
    beep(80,0.8,"sawtooth",0.1);
    boss=null; spawnT=90; player.power=Math.min(3,player.power+1);
  }

  function endGame(){
    if (score>hi){ hi=score; localStorage.setItem("ss1942_hi", hi); }
    setTimeout(()=>state="over", 900);
  }

  // ---- Rendering ------------------------------------------------------------
  let bg = [];
  for(let i=0;i<40;i++) bg.push({x:rnd(0,W), y:rnd(0,H), s:rnd(1,3), v:rnd(0.6,2)});
  let clouds=[]; for(let i=0;i<7;i++) clouds.push({x:rnd(0,W),y:rnd(0,H),r:rnd(30,70),v:rnd(0.3,0.8)});

  function drawBg(){
    ctx.fillStyle="#0b2a44"; ctx.fillRect(0,0,W,H);
    // sea texture streaks
    ctx.fillStyle="#0e3457";
    for (const s of bg){ s.y+=s.v*(state==="play"?1:0.4); if(s.y>H){s.y=-4;s.x=rnd(0,W);}
      ctx.fillRect(s.x, s.y, s.s, s.s*3); }
    ctx.globalAlpha=0.10; ctx.fillStyle="#dfeaff";
    for (const c of clouds){ c.y+=c.v*(state==="play"?1:0.3); if(c.y-c.r>H){c.y=-c.r;c.x=rnd(0,W);}
      ctx.beginPath(); ctx.arc(c.x,c.y,c.r,0,7); ctx.fill(); }
    ctx.globalAlpha=1;
  }

  function drawPlane(x,y,scale,color,dark,flip){
    ctx.save(); ctx.translate(x,y); ctx.scale(scale, flip?-scale:scale);
    // fuselage
    ctx.fillStyle=color;
    ctx.beginPath(); ctx.moveTo(0,-16); ctx.lineTo(5,10); ctx.lineTo(0,16); ctx.lineTo(-5,10); ctx.closePath(); ctx.fill();
    // wings
    ctx.fillStyle=dark;
    ctx.beginPath(); ctx.moveTo(-18,4); ctx.lineTo(18,4); ctx.lineTo(10,10); ctx.lineTo(-10,10); ctx.closePath(); ctx.fill();
    ctx.fillRect(-7,-14,14,4); // tail wing
    // cockpit
    ctx.fillStyle="#bfe3ff"; ctx.beginPath(); ctx.arc(0,-2,3,0,7); ctx.fill();
    ctx.restore();
  }

  function drawPlayer(){
    if (player.dead) return;
    const blink = player.inv>0 && (frame>>2)%2===0;
    if (blink) ctx.globalAlpha=0.35;
    let sc=1;
    if (player.rolling>0){ // barrel-roll squash
      const t=player.rolling/24; sc = 0.4+0.6*Math.abs(Math.cos((1-t)*Math.PI));
      ctx.save(); ctx.translate(player.x,player.y); ctx.scale(sc*player.rollDir,1);
      drawPlane(0,0,1,"#7fe08a","#3a9d52",false); ctx.restore();
    } else {
      drawPlane(player.x,player.y,1,"#8ef0a0","#3a9d52",false);
    }
    ctx.globalAlpha=1;
    // exhaust
    ctx.fillStyle="rgba(120,200,255,.7)";
    ctx.fillRect(player.x-2, player.y+14, 4, rnd(6,12));
  }

  function drawEnemy(e){
    const col = e.markPow? "#ff4d4d" : (e.type==="gunner"?"#d9a441":"#c7d2e0");
    const dk  = e.markPow? "#a11" : (e.type==="gunner"?"#7a5a1e":"#7d8ba0");
    drawPlane(e.x,e.y,e.type==="gunner"?1.15:0.95, col, dk, true);
  }

  function drawBoss(){
    if (!boss) return;
    ctx.save(); ctx.translate(boss.x,boss.y);
    ctx.fillStyle = boss.flash>0? "#ffffff":"#9aa7bb";
    // big bomber body
    ctx.beginPath(); ctx.moveTo(0,-40); ctx.lineTo(20,30); ctx.lineTo(-20,30); ctx.closePath(); ctx.fill();
    ctx.fillStyle = boss.flash>0? "#ffffff":"#6b788c";
    ctx.fillRect(-56,-6,112,20); // wing
    ctx.fillRect(-14,20,28,14);
    ctx.fillStyle="#ffcf4d"; // engines
    ctx.fillRect(-40,-2,8,10); ctx.fillRect(32,-2,8,10);
    ctx.restore();
    // hp bar
    ctx.fillStyle="#331"; ctx.fillRect(60,16,W-120,7);
    ctx.fillStyle="#ff5252"; ctx.fillRect(60,16,(W-120)*boss.hp/boss.hpMax,7);
    ctx.strokeStyle="#000"; ctx.strokeRect(60,16,W-120,7);
  }

  function draw(){
    drawBg();
    if (state==="title"){ drawTitle(); return; }

    // power-ups
    for (const pu of powerups){
      ctx.save(); ctx.translate(pu.x,pu.y); ctx.rotate(pu.t*0.1);
      ctx.fillStyle="#ffcf4d"; ctx.fillRect(-9,-9,18,18);
      ctx.fillStyle="#0b2a44"; ctx.font="bold 14px monospace"; ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.rotate(-pu.t*0.1); ctx.fillText("P",0,1); ctx.restore();
    }
    for (const e of enemies) drawEnemy(e);
    drawBoss();
    // bullets
    ctx.fillStyle="#ffe15a"; for (const b of bullets){ ctx.fillRect(b.x-b.w/2,b.y-b.h/2,b.w,b.h); }
    ctx.fillStyle="#ff6b6b"; for (const b of ebullets){ ctx.beginPath(); ctx.arc(b.x,b.y,b.w/2,0,7); ctx.fill(); }
    drawPlayer();
    // particles
    for (const p of particles){ ctx.globalAlpha=Math.max(0,p.life/p.max); ctx.fillStyle=p.color;
      ctx.fillRect(p.x-1.5,p.y-1.5,3,3); }
    ctx.globalAlpha=1;

    drawHUD();
    if (state==="over") drawOver();
  }

  function drawHUD(){
    ctx.fillStyle="#e8eef7"; ctx.font="bold 16px monospace"; ctx.textAlign="left"; ctx.textBaseline="top";
    ctx.fillText("SCORE "+String(score).padStart(6,"0"), 10, 8);
    ctx.textAlign="right"; ctx.fillText("HI "+String(hi).padStart(6,"0"), W-10, 8);
    // lives
    ctx.textAlign="left";
    for(let i=0;i<Math.max(0,player.lives);i++) drawPlane(20+i*22, 44, 0.55, "#8ef0a0","#3a9d52",false);
    // power
    ctx.fillStyle="#ffcf4d"; ctx.font="12px monospace";
    ctx.fillText("PWR "+"▮".repeat(player.power)+"▯".repeat(3-player.power), W-96, 34);
    // roll cooldown
    ctx.fillStyle = rollCd<=0? "#5ad1ff":"#3a5a72";
    ctx.fillText("ROLL "+(rollCd<=0?"READY":"·····".slice(0,Math.ceil(rollCd/18))), W-96, 50);
    ctx.fillStyle="#6f88ad"; ctx.font="11px monospace"; ctx.fillText("WAVE "+waveN, 10, 66);
  }

  function drawTitle(){
    ctx.textAlign="center";
    ctx.fillStyle="#ffcf4d"; ctx.font="bold 44px monospace";
    ctx.fillText("SKY STRIKE", W/2, H/2-90);
    ctx.fillStyle="#8ef0a0"; ctx.font="bold 30px monospace";
    ctx.fillText("- 1942 -", W/2, H/2-52);
    drawPlane(W/2, H/2+10, 2.2, "#8ef0a0","#3a9d52",false);
    ctx.fillStyle="#e8eef7"; ctx.font="16px monospace";
    ctx.fillText((frame>>4)%2? "PRESS ENTER / TAP TO START":"", W/2, H/2+90);
    ctx.fillStyle="#6f88ad"; ctx.font="12px monospace";
    ctx.fillText("← → ↑ ↓  MOVE", W/2, H/2+130);
    ctx.fillText("Z / SPACE  FIRE      X / SHIFT  ROLL", W/2, H/2+150);
    ctx.fillText("HI "+String(hi).padStart(6,"0"), W/2, H/2+185);
  }

  function drawOver(){
    ctx.fillStyle="rgba(5,10,20,.7)"; ctx.fillRect(0,0,W,H);
    ctx.textAlign="center";
    ctx.fillStyle="#ff5252"; ctx.font="bold 40px monospace";
    ctx.fillText("GAME OVER", W/2, H/2-40);
    ctx.fillStyle="#e8eef7"; ctx.font="20px monospace";
    ctx.fillText("SCORE "+String(score).padStart(6,"0"), W/2, H/2+6);
    ctx.fillStyle="#ffcf4d";
    ctx.fillText(score>=hi? "NEW HI-SCORE!":"HI  "+String(hi).padStart(6,"0"), W/2, H/2+34);
    ctx.fillStyle="#8ef0a0"; ctx.font="16px monospace";
    if ((frame>>4)%2) ctx.fillText("ENTER / TAP  TO RETRY", W/2, H/2+80);
  }

  // ---- Main loop ------------------------------------------------------------
  function tick(){
    if (state==="play") update();
    else { frame++; for (const k in keys) if (k.endsWith("_p")) { /* keep until handled below */ } }

    if ((state==="title"||state==="over") && (keys.start_p || keys.fire_p)){
      keys.start_p=false; keys.fire_p=false;
      reset(); state="play"; beep(660,0.1,"square",0.05);
    }
    draw();
    // clear press flags for menu states
    for (const k in keys) if (k.endsWith("_p")) keys[k]=false;
    requestAnimationFrame(tick);
  }

  reset(); state="title";
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
